name: Frontend CI/CD

on:
  push:
    branches: [DeployTest]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          TAG=${GITHUB_SHA}
          docker build -t ghcr.io/ahmedehab5006/frontend:$TAG .

      - name: Push Image
        run: |
          TAG=${GITHUB_SHA}
          docker push ghcr.io/ahmedehab5006/frontend:$TAG