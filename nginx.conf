# =========================
# RATE LIMITING ZONES
# =========================
limit_req_zone $binary_remote_addr zone=core_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=worker_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=django_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=frontend_limit:10m rate=50r/s;

server {
    listen 80;
    server_name 172.1.50.98;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /locales/ {
        try_files $uri $uri/ =404;
    }

    # =========================
    # CORE SERVICE - WebSocket Hub
    # =========================
    location core/hubs/chatHub {
        limit_req zone=core_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://core-service:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location core/hubs/notificationHub {
        limit_req zone=core_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://core-service:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location core/hubs/researchProgressHub {
        limit_req zone=core_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://core-service:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # =========================
    # CORE SERVICE
    # =========================
    location /core/ {
        limit_req zone=core_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://core-service:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # ADMIN SERVICE
    # =========================
    location /admin/ {
        limit_req zone=admin_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://admin-service:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # WORKER SERVICE
    # =========================
    location /worker/ {
        limit_req zone=worker_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://worker-service:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # DJANGO SERVICE
    # =========================
    location /Researches/ {
        limit_req zone=django_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://django-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # FRONTEND - Catch All (React Router)
    # =========================
    location / {
        limit_req zone=frontend_limit burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}